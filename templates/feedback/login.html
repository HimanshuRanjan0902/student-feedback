{% extends "feedback/base.html" %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row shadow-lg rounded-4 overflow-hidden bg-white">

        <!-- Left Image -->
        <div class="col-lg-6 d-none d-lg-block p-0">

            <img src="{% static 'feedback/img/studentstudying.jpg' %}"
                 class="img-fluid h-100 w-100"
                 style="object-fit:cover;">

        </div>

        <!-- Login Form -->
        <div class="col-lg-6 p-5">

            <div class="text-center mb-4">

                <img src="{% static 'feedback/img/logo.jpg' %}"
                     width="80"
                     class="rounded-circle shadow mb-3">

                <h2 class="fw-bold">Welcome Back</h2>

                <p class="text-muted">
                    Login to your Student Feedback account
                </p>

            </div>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Login
                </button>

            </form>

            <hr>

            <p class="text-center">

                Don't have an account?

                <a href="{% url 'feedback:register' %}">
                    Register Here
                </a>

            </p>

        </div>

    </div>

</div>

{% endblock %}
